{% extends "admin/layout.html" %}

{% block title %}견적서 작성{% endblock %}

{% block content %}
<style>
  .quote-box {
    border: 2px solid #ccc;
    padding: 30px;
    border-radius: 15px;
    background-color: #fff;
  }
  .quote-box h2 {
    font-size: 24px;
    font-weight: bold;
    background-color: #0d6efd;
    color: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 30px;
    text-align: center;
  }
  .form-section label {
    font-weight: bold;
    margin-bottom: 5px;
  }
  .form-section {
    margin-bottom: 20px;
  }
</style>

<div class="container mt-4">
  <div class="quote-box">
    <h2>📝 고객 요청 기반 견적서 작성</h2>

    <form method="POST" action="">
      <!-- 담당자 이름 -->
      <div class="form-section">
        <label>담당자 이름</label>
        <input type="text" name="manager_name" class="form-control" required>
      </div>

      <!-- 여행 일정 요약 -->
      <div class="form-section">
        <label>여행 일정 요약</label>
        <textarea name="itinerary_summary" class="form-control" rows="3" placeholder="예: 1일차 방콕 시티투어, 2일차 파타야 바닷가..."></textarea>
      </div>

      <!-- 포함 내역 -->
      <div class="form-section">
        <label>포함 내역</label>
        <textarea name="included_items" class="form-control" rows="3"></textarea>
      </div>

      <!-- 불포함 내역 -->
      <div class="form-section">
        <label>불포함 내역</label>
        <textarea name="excluded_items" class="form-control" rows="3"></textarea>
      </div>

      <!-- 총 견적 금액 -->
      <div class="form-section">
        <label>총 견적 금액 (₩)</label>
        <input type="number" name="total_price" class="form-control" required>
      </div>

      <!-- 저장 버튼 -->
      <div class="text-center">
        <button type="submit" class="btn btn-primary">💾 견적서 저장</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
