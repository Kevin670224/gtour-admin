{% extends "layout.html" %}
{% block title %}· 맞충 가격 검색{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
<style>
  @font-face {
    font-family: 'HumanRounded';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2107@1.0/HumanRounded.woff') format('woff');
    font-weight: 700;
    font-style: normal;
  }
  .quote-title {
    font-family: 'HumanRounded', 'Malgun Gothic', sans-serif;
    font-size: 40px;
    font-weight: 900;
    color: white;
  }
  .quote-subtitle {
    color: white;
    font-weight: bold;
    margin-top: 10px;
  }
  .card-header-custom {
    background-color: #007bff;
    padding: 30px 20px;
    text-align: center;
    border-radius: 10px 10px 0 0;
  }
  .form-select.country-select { width: 25%; display: inline-block; }
  .form-select.region-select { width: 25%; display: inline-block; margin-left: 10px; }
  .form-select.product-select { width: 45%; display: inline-block; margin-left: 10px; }
</style>

<div class="container-fluid mt-5 mb-5">
  <div class="card shadow-sm px-3">
    <div class="card-header-custom">
      <h1 class="quote-title">✈ 맞충 검색</h1>
      <p class="quote-subtitle">📌 가이드 4U의 모든 상품은 단독 차반 + 단독 가이드로 진행되는 단독투어 상품입니다!</p>
    </div>
    <div class="card-body">
      <form id="quoteForm" method="POST" action="/quote/submit">
        {% include 'quote_form_fields.html' %}
      </form>
    </div>
  </div>
</div>

<div class="modal fade" id="privacyModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">개인정보 제3자 제공</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
      </div>
      <div class="modal-body">
        계약 및 진행 과정에서 리조트/가이드에게 필요한 최소한의 정보만 전달됩니다.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
<script>
  flatpickr("#travel_period", {
    mode: "range",
    dateFormat: "Y-m-d",
    locale: "ko",
    showMonths: 2,
    minDate: "today"
  });

  function updateProducts() {
    const region = document.getElementById('region').value;
    const product = document.getElementById('product');
    const options = {
      '푸켓': ['푸켓 자유여행 4박6일', '푸켓 허니문 5성급', '푸켓 가족 풀빌라'],
      '다낭': ['다낭 3박5일 패키지', '다낭 골프투어', '다낭 자유여행 추천'],
      '방콕': ['방콕 + 파타야 패키지', '방콕 쇼핑 & 마사지', '방콕 가족 자유여행']
    };
    product.innerHTML = '<option value="">상품선택 (원하시는 투어 상품을 선택해 주세요)</option>';
    if (options[region]) {
      options[region].forEach(function(item) {
        const opt = document.createElement('option');
        opt.value = item;
        opt.text = item;
        product.appendChild(opt);
      });
    }
  }

  function fillProductName() {
    const selected = document.getElementById('product').value;
    document.getElementById('product_name').value = selected;
  }

  function formatPhone(input) {
    let value = input.value.replace(/[^0-9]/g, '');
    if (value.length >= 10) {
      input.value = value.replace(/(\d{3})(\d{3,4})(\d{4})/, '$1-$2-$3');
    }
  }

  function toggleAirportOther() {
    const etcChecked = document.getElementById('airport_etc').checked;
    const otherInput = document.getElementById('departure_airport_other');
    otherInput.style.display = etcChecked ? 'block' : 'none';
  }

  function toggleResortName() {
    const radios = document.getElementsByName('resort_status');
    const input = document.getElementById('resort_name_input');
    let show = false;
    radios.forEach(radio => {
      if (radio.checked && radio.value === '예약 완료') {
        show = true;
      }
    });
    input.style.display = show ? 'block' : 'none';
  }

  document.getElementById('agree_all').addEventListener('change', function () {
    const checked = this.checked;
    document.getElementById('agree1').checked = checked;
    document.getElementById('agree2').checked = checked;
  });

  window.addEventListener('DOMContentLoaded', () => {
    toggleAirportOther();
    toggleResortName();

    document.querySelectorAll('a[data-bs-toggle="modal"]').forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        const modal = new bootstrap.Modal(target);
        modal.show();
      });
    });
  });
</script>
{% endblock %}
