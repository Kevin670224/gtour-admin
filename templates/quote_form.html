{% extends "layout.html" %}
{% block title %}맞춤 견적 요청{% endblock %}

{% block content %}
<style>
  .quote-box {
    border: 2px solid #ccc;
    border-radius: 15px;
    padding: 30px;
    background-color: #f9f9f9;
    max-width: 1000px;
    margin: auto;
  }
  .quote-title {
    background-color: #007BFF;
    color: white;
    padding: 15px;
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    border-radius: 10px;
    margin-bottom: 15px;
  }
  .quote-subtitle {
    text-align: center;
    color: #333;
    font-size: 14px;
    margin-bottom: 30px;
  }
  .submit-btn {
    background-color: #007BFF;
    color: white;
    font-size: 18px;
    padding: 10px 30px;
    border: none;
    border-radius: 8px;
    display: block;
    margin: 30px auto 0;
  }
  .form-section {
    margin-bottom: 25px;
  }
  .hidden {
    display: none;
  }
</style>

<div class="quote-box">
  <div class="quote-title">📝 맞춤 견적 요청</div>
  <div class="quote-subtitle">가이드 4U 에서 제공 하는 모든 투어 상품은 단독 차량 + 단독 가이드를 이용한 단독 투어 입니다!</div>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="alert alert-success">{{ messages[0] }}</div>
    {% endif %}
  {% endwith %}

  <form method="POST" action="/quote">
    <div class="form-section">
      <h5>👤 고객 정보</h5>
      <input type="text" name="name" class="form-control mb-2" placeholder="이름 *" required>
      <input type="tel" name="phone" class="form-control mb-2" placeholder="전화번호 (01012345678 형식)" required oninput="formatPhoneNumber(this)">
      <input type="email" name="email" class="form-control" placeholder="이메일 (선택)">
    </div>

    <div class="form-section">
      <h5>📅 여행기간</h5>
      <input type="text" name="travel_period" id="travel_period" class="form-control" placeholder="출발일 ~ 도착일" required>
    </div>

    <button type="submit" class="submit-btn">✉ 견적 제출</button>
  </form>
</div>

<!-- Flatpickr -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
  flatpickr("#travel_period", {
    mode: "range",
    dateFormat: "Y-m-d",
    locale: "ko",
    minDate: "today",
    showMonths: 2
  });

  function formatPhoneNumber(input) {
    let digits = input.value.replace(/\D/g, '');
    if (digits.length === 11) {
      input.value = digits.replace(/(\d{3})(\d{4})(\d{4})/, '$1-$2-$3');
    }
  }
</script>
{% endblock %}
