{% extends "layout.html" %}
{% block title %} 맞춤 견적 요청 {% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
<style>
  @font-face {
    font-family: 'HumanRounded';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2107@1.0/HumanRounded.woff') format('woff');
    font-weight: 700;
    font-style: normal;
  }
  .quote-title {
    font-family: 'HumanRounded', 'Malgun Gothic', sans-serif;
    font-size: 40px;
    font-weight: 900;
    color: white;
  }
  .quote-subtitle {
    color: white;
    font-weight: bold;
    margin-top: 10px;
  }
  .card-header-custom {
    background-color: #007bff;
    padding: 30px 20px;
    text-align: center;
    border-radius: 10px 10px 0 0;
  }
  .form-select.country-select { width: 25%; display: inline-block; }
  .form-select.region-select { width: 25%; display: inline-block; margin-left: 10px; }
  .form-select.product-select { width: 45%; display: inline-block; margin-left: 10px; }
</style>

<div class="container-fluid mt-5 mb-5">
  <div class="card shadow-sm px-3">
    <div class="card-header-custom">
      <h1 class="quote-title">✈ 맞춤 견적 요청</h1>
      <p class="quote-subtitle">📌 가이드 4U의 모든 상품은 단독 차량 + 단독 가이드로 진행되는 단독투어 상품입니다!</p>
    </div>
    <div class="card-body">
      <form id="quoteForm" method="POST" action="/quote/submit">

        <!-- 고객정보 -->
        <h5 class="fw-bold mt-4">🧍 고객정보</h5>
        <div class="mb-3">
          <label class="form-label">고객명 *</label>
          <input type="text" class="form-control" name="customer_name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">연락처 *</label>
          <input type="text" class="form-control" name="phone" placeholder="010-1234-5678" required oninput="formatPhone(this)">
        </div>
        <div class="mb-3">
          <label class="form-label">이메일</label>
          <input type="email" class="form-control" name="email" placeholder="예: guide4u@email.com">
        </div>

        <!-- 여행지 선택 -->
        <h5 class="fw-bold mt-4">🌍 여행지 선택</h5>
        <div class="mb-3">
          <select class="form-select country-select" id="country" name="country" required>
            <option value="">국가</option>
            <option value="태국">태국</option>
            <option value="베트남">베트남</option>
          </select>
          <select class="form-select region-select" id="region" name="region" onchange="updateProducts()" required>
            <option value="">지역</option>
            <option value="방콕">방콕</option>
            <option value="푸켓">푸켓</option>
            <option value="다낭">다낭</option>
          </select>
          <select class="form-select product-select" id="product" name="product" onchange="fillProductName()">
            <option value="">상품선택 (원하시는 투어 상품을 선택해 주세요)</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">원하시는 투어가 없을 시 자유롭게 적어 주세요</label>
          <textarea class="form-control" name="custom_destination" rows="3"></textarea>
        </div>
        <input type="hidden" class="form-control" id="product_name" name="product_name">

        <!-- 여행기간 -->
        <h5 class="fw-bold mt-4">🗓 여행기간</h5>
        <div class="mb-3">
          <input type="text" class="form-control" id="travel_period" name="travel_period" placeholder="여행 출발일 ~ 도착일" required>
        </div>

        <!-- 총 인원 -->
        <h5 class="fw-bold mt-4">👥 총 인원</h5>
        <div class="mb-3 row">
          <div class="col-md-4">
            <label class="form-label">성인</label>
            <input type="number" class="form-control" name="adults" value="0" min="0" oninput="updateTotal()">
          </div>
          <div class="col-md-4">
            <label class="form-label">아동</label>
            <input type="number" class="form-control" name="children" value="0" min="0" oninput="updateTotal()">
          </div>
          <div class="col-md-4">
            <label class="form-label">유아</label>
            <input type="number" class="form-control" name="infants" value="0" min="0" oninput="updateTotal()">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">총 인원: <span id="totalCount">0</span> 명</label>
        </div>

        <!-- 항공 정보 -->
        <h5 class="fw-bold mt-4">🛫 항공 정보</h5>
        <div class="mb-3">
          <div class="form-check">
            <input class="form-check-input" type="radio" name="flight_status" value="가이드 추천" onclick="toggleFlightInput()" checked>
            <label class="form-check-label">예약 전 (가이드 4U 추천)</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="flight_status" value="직접 예약 예정" onclick="toggleFlightInput()">
            <label class="form-check-label">예약 전 (직접 예약 예정)</label>
          </div>
          <div id="departure_airport" style="display:none;">
            <label class="form-label mt-2">출발 공항 선택</label>
            <select class="form-select mb-2" name="departure_airport">
              <option value="">출발공항 선택</option>
              <option value="인천">인천</option>
              <option value="김해">김해</option>
              <option value="기타">기타 (직접입력)</option>
            </select>
            <input type="text" class="form-control" name="departure_airport_other" placeholder="예: 청주">
          </div>
          <div class="form-check mt-3">
            <input class="form-check-input" type="radio" name="flight_status" value="예약 완료" onclick="toggleFlightInput()">
            <label class="form-check-label">예약 완료</label>
          </div>
          <input type="text" class="form-control mt-2" id="flight_detail" name="flight_detail" placeholder="항공편명을 입력해 주세요 (예: KE124 / KE123)" style="display:none;">
        </div>

        <!-- 이하 리조트, 기타 요청사항, 약관 및 제출 버튼 등은 기존 코드 그대로 유지 -->

      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
<script>
  flatpickr("#travel_period", {
    mode: "range",
    dateFormat: "Y-m-d",
    locale: "ko",
    showMonths: 2,
    minDate: "today"
  });

  function formatPhone(input) {
    let value = input.value.replace(/[^0-9]/g, '');
    if (value.length >= 10) {
      input.value = value.replace(/(\d{3})(\d{3,4})(\d{4})/, '$1-$2-$3');
    }
  }

  function updateTotal() {
    const adults = parseInt(document.querySelector('[name="adults"]').value || 0);
    const children = parseInt(document.querySelector('[name="children"]').value || 0);
    const infants = parseInt(document.querySelector('[name="infants"]').value || 0);
    document.getElementById('totalCount').innerText = adults + children + infants;
  }

  function toggleFlightInput() {
    const value = document.querySelector('input[name="flight_status"]:checked').value;
    document.getElementById('flight_detail').style.display = value === '예약 완료' ? 'block' : 'none';
    document.getElementById('departure_airport').style.display = (value === '가이드 추천' || value === '직접 예약 예정') ? 'block' : 'none';
  }

  window.addEventListener('DOMContentLoaded', () => {
    toggleFlightInput();
  });
</script>
{% endblock %}
