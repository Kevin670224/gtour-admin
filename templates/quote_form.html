{% extends "layout.html" %}
{% block title %}맞춤 견적 요청{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
<style>
  @font-face {
    font-family: 'HumanRounded';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2107@1.0/HumanRounded.woff') format('woff');
    font-weight: 700;
    font-style: normal;
  }

  .quote-title {
    font-family: 'HumanRounded', 'Malgun Gothic', sans-serif;
    font-size: 40px;
    font-weight: 900;
    color: white;
  }

  .quote-subtitle {
    color: white;
    font-weight: bold;
    margin-top: 10px;
  }

  .card-header-custom {
    background-color: #007bff;
    padding: 30px 20px;
    text-align: center;
    border-radius: 10px 10px 0 0;
  }

  .form-select.country-select { width: 25%; display: inline-block; }
  .form-select.region-select { width: 25%; display: inline-block; margin-left: 10px; }
  .form-select.product-select { width: 45%; display: inline-block; margin-left: 10px; }
</style>

<div class="container-fluid mt-5 mb-5">
  <div class="card shadow-sm px-3">
    <div class="card-header-custom">
      <h1 class="quote-title">✈ 맞축 결적 요청</h1>
      <p class="quote-subtitle">📌 가이드 4U의 모든 상품은 단독 차반 + 단독 가이드로 진행되는 단독투어 상품입니다!</p>
    </div>
    <div class="card-body">
      <form id="quoteForm" method="POST" action="/quote/submit">
        <!-- 조각을 재설정한 JS 확인 및 복사용 작업 수행 -->
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
<script>
  flatpickr("#travel_period", {
    mode: "range",
    dateFormat: "Y-m-d",
    locale: "ko",
    showMonths: 2,
    minDate: "today"
  });

  function toggleAirportOther() {
    const etcChecked = document.getElementById('airport_etc').checked;
    const otherInput = document.getElementById('departure_airport_other');
    otherInput.style.display = etcChecked ? 'block' : 'none';
  }

  function toggleResortName() {
    const resortRadios = document.getElementsByName('resort_status');
    const input = document.getElementById('resort_name_input');
    let showInput = false;
    resortRadios.forEach(radio => {
      if (radio.checked && radio.value === '예약 완료') {
        showInput = true;
      }
    });
    input.style.display = showInput ? 'block' : 'none';
  }

  window.addEventListener('DOMContentLoaded', function () {
    toggleAirportOther();
    toggleResortName();
  });
</script>
{% endblock %}
