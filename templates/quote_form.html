{% extends "layout.html" %}
{% block title %}맞춤 견적 요청{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
<style>
  @font-face {
    font-family: 'HumanRounded';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2107@1.0/HumanRounded.woff') format('woff');
    font-weight: 700;
    font-style: normal;
  }
  .quote-title {
    font-family: 'HumanRounded', 'Malgun Gothic', sans-serif;
    font-size: 40px;
    font-weight: 900;
    color: white;
  }
  .quote-subtitle {
    color: white;
    font-weight: bold;
    margin-top: 10px;
  }
  .card-header-custom {
    background-color: #007bff;
    padding: 30px 20px;
    text-align: center;
    border-radius: 10px 10px 0 0;
  }
  .form-select.country-select { width: 25%; display: inline-block; }
  .form-select.region-select { width: 25%; display: inline-block; margin-left: 10px; }
  .form-select.product-select { width: 45%; display: inline-block; margin-left: 10px; }
</style>

<div class="container-fluid mt-5 mb-5">
  <div class="card shadow-sm px-3">
    <div class="card-header-custom">
      <h1 class="quote-title">✈ 맞춤 견적 요청</h1>
      <p class="quote-subtitle">📌 가이드 4U의 모든 상품은 단독 차량 + 단독 가이드로 진행되는 단독투어 상품입니다!</p>
    </div>
    <div class="card-body">
      <form id="quoteForm" method="POST" action="/quote/submit">
        <!-- ✈ 출발 공항 -->
        <h5 class="fw-bold mt-4">✈ 출발 공항</h5>
        <div class="mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="departure_airport" value="인천공항" id="airport_incheon">
            <label class="form-check-label" for="airport_incheon">인천공항</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="departure_airport" value="김해공항" id="airport_gimhae">
            <label class="form-check-label" for="airport_gimhae">김해공항</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="departure_airport" value="기타" id="airport_etc" onchange="toggleAirportOther()">
            <label class="form-check-label" for="airport_etc">기타 - 직접 입력해 주세요! (예: 청주공항)</label>
          </div>
          <input type="text" class="form-control mt-1" name="departure_airport_other" id="departure_airport_other" placeholder="예: 청주공항" style="display:none;">
        </div>

        <!-- 🏨 리조트 정보 -->
        <h5 class="fw-bold mt-4">🏨 리조트 정보</h5>
        <div class="mb-3">
          <div class="form-check">
            <input class="form-check-input" type="radio" name="resort_status" value="가이드 추천" onchange="toggleResortName()">
            <label class="form-check-label">예약 전 (가이드 4U 추천)</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="resort_status" value="직접 예약" onchange="toggleResortName()">
            <label class="form-check-label">예약 전 (직접 예약 예정)</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="resort_status" value="예약 완료" onchange="toggleResortName()">
            <label class="form-check-label">예약 완료</label>
          </div>
          <input type="text" class="form-control mt-1" name="resort_name" id="resort_name_input" placeholder="리조트 이름을 입력해 주세요 (예: 센타라 리조트)" style="display:none;">
        </div>

        <!-- ✅ 약관동의 -->
        <div class="border rounded p-3 mb-3">
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="agree_all">
            <label class="form-check-label fw-bold" for="agree_all">전체약관동의</label>
          </div>
          <div class="ps-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="agree" id="agree1" required>
              <label class="form-check-label" for="agree1">[필수] 개인정보 수집 및 이용(견적)</label>
              <span class="float-end"><a href="#" onclick="showTerms(event, 'terms1')">자세히보기 &gt;</a></span>
            </div>
            <div class="form-check mt-2">
              <input class="form-check-input" type="checkbox" name="agree2" id="agree2" required>
              <label class="form-check-label" for="agree2">[필수] 개인정보 제3자 제공(견적)</label>
              <span class="float-end"><a href="#" onclick="showTerms(event, 'terms2')">자세히보기 &gt;</a></span>
            </div>
          </div>
        </div>

        <!-- 제출 버튼 -->
        <div class="text-center">
          <button type="submit" class="btn btn-success px-4 py-2 fw-bold" style="font-size: 18px;">
            ✉ 견적 제출
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- 약관 팝업 모달 -->
<div id="termsModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6);">
  <div style="background:white; margin:10% auto; padding:20px; width:80%; max-width:500px;">
    <h5 id="termsTitle"></h5>
    <p id="termsContent"></p>
    <div class="text-end">
      <button class="btn btn-secondary" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<script>
  function toggleAirportOther() {
    const isChecked = document.getElementById('airport_etc').checked;
    document.getElementById('departure_airport_other').style.display = isChecked ? 'block' : 'none';
  }

  function toggleResortName() {
    const radios = document.getElementsByName('resort_status');
    const input = document.getElementById('resort_name_input');
    let visible = false;
    radios.forEach(radio => {
      if (radio.checked && radio.value === '예약 완료') {
        visible = true;
      }
    });
    input.style.display = visible ? 'block' : 'none';
  }

  function showTerms(event, which) {
    event.preventDefault();
    document.getElementById('termsModal').style.display = 'block';
    if (which === 'terms1') {
      document.getElementById('termsTitle').innerText = '개인정보 수집 및 이용';
      document.getElementById('termsContent').innerText = '개인정보는 맞춤 견적 요청에만 사용되며, 계약 진행 시까지 보관됩니다.';
    } else if (which === 'terms2') {
      document.getElementById('termsTitle').innerText = '개인정보 제3자 제공';
      document.getElementById('termsContent').innerText = '계약 및 진행 과정에서 리조트/가이드에게 필요한 최소한의 정보만 전달됩니다.';
    }
  }

  function closeModal() {
    document.getElementById('termsModal').style.display = 'none';
  }

  document.getElementById('agree_all').addEventListener('change', function () {
    document.getElementById('agree1').checked = this.checked;
    document.getElementById('agree2').checked = this.checked;
  });

  window.addEventListener('DOMContentLoaded', () => {
    toggleAirportOther();
    toggleResortName();
  });
</script>
{% endblock %}
